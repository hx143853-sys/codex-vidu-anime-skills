interface:
  display_name: "Zombie Storyboard Director"
  short_description: "Convert scripts into detailed professional anime storyboard tables."
  default_prompt: "Convert this AI anime drama script into a detailed professional storyboard table with shot number, duration, shot size, scene, per-shot visible/speaking characters, shootable natural-language picture description, dialogue, sound, and notes. In every picture description, say exactly who is where, what they do, what expression/posture they show, who or what they look at, and how the camera frames the visible action. Avoid vague pronouns, scene-code wording, and abstract commentary, and do not generate Vidu prompts or saved-subject tokens."
